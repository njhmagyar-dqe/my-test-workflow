name: Close Linked Issues on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  issues: write
  pull-requests: write

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Collect and close linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumbers = new Set();

            // 1. Find all merged PRs whose merge commit is in this PR's diff
            //    (i.e., feature PRs that were merged into stage)
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            // Look for merge commits from sub-PRs
            const mergePattern = /^Merge pull request #(\d+)/;
            const squashPattern = /\(#(\d+)\)$/;

            const subPrNumbers = [];
            for (const commit of commits) {
              const msg = commit.commit.message;
              const mergeMatch = msg.match(mergePattern);
              const squashMatch = msg.match(squashPattern);
              if (mergeMatch) subPrNumbers.push(parseInt(mergeMatch[1]));
              if (squashMatch) subPrNumbers.push(parseInt(squashMatch[1]));
            }

            core.info(`Found ${subPrNumbers.length} sub-PRs: ${subPrNumbers.join(', ')}`);

            // 2. For each sub-PR, extract issue references from the body
            const closingKeywords = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;

            for (const subPrNumber of subPrNumbers) {
              try {
                const { data: subPr } = await github.rest.pulls.get({
                  owner, repo, pull_number: subPrNumber,
                });

                if (subPr.body) {
                  let match;
                  while ((match = closingKeywords.exec(subPr.body)) !== null) {
                    issueNumbers.add(parseInt(match[1]));
                  }
                  closingKeywords.lastIndex = 0;
                }
              } catch (e) {
                core.warning(`Could not fetch sub-PR #${subPrNumber}: ${e.message}`);
              }
            }

            // 3. Also check the stage->main PR body itself
            if (pr.body) {
              let match;
              while ((match = closingKeywords.exec(pr.body)) !== null) {
                issueNumbers.add(parseInt(match[1]));
              }
            }

            core.info(`Issues to close: ${[...issueNumbers].join(', ') || 'none'}`);

            // 4. Update the stage->main PR body with collected references
            if (issueNumbers.size > 0) {
              const issueList = [...issueNumbers].map(n => `Closes #${n}`).join('\n');
              const separator = '\n\n---\n### Linked Issues\n';
              const newBody = (pr.body || '') + separator + issueList;

              await github.rest.pulls.update({
                owner, repo, pull_number: pr.number,
                body: newBody,
              });
              core.info('Updated PR body with linked issues');
            }

            // 5. Close all linked issues
            for (const issueNumber of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner, repo, issue_number: issueNumber,
                });

                if (issue.state === 'open') {
                  await github.rest.issues.update({
                    owner, repo, issue_number: issueNumber,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                  core.info(`Closed issue #${issueNumber}`);
                }
              } catch (e) {
                core.warning(`Could not close issue #${issueNumber}: ${e.message}`);
              }
            }

            if (issueNumbers.size === 0) {
              core.info('No linked issues found');
            }
