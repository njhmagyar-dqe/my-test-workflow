name: Notify Linked Issues on Sub-PR Merge

on:
  pull_request:
    types: [closed]
    branches: [stage]

permissions:
  issues: write

jobs:
  notify-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Comment on linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const closingKeywords = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = new Set();

            if (pr.body) {
              let match;
              while ((match = closingKeywords.exec(pr.body)) !== null) {
                issueNumbers.add(parseInt(match[1]));
              }
            }

            core.info(`Issues referenced: ${[...issueNumbers].join(', ') || 'none'}`);

            for (const issueNumber of issueNumbers) {
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `🔗 Referenced in PR #${pr.number} — [${pr.title}](${pr.html_url}) (merged to \`stage\`)`,
                });
                core.info(`Commented on issue #${issueNumber}`);
              } catch (e) {
                core.warning(`Could not comment on issue #${issueNumber}: ${e.message}`);
              }
            }
