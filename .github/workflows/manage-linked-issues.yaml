name: Manage Linked Issues

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [main, stage]

permissions:
  issues: write
  pull-requests: write

jobs:
  link-issues:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Collect issues and post sticky comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = pr.base.ref;
            const issueNumbers = new Set();
            const closingKeywords = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;

            if (base === 'main') {
              // For main PRs: find sub-PRs via timeline events
              const timeline = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                { owner, repo, issue_number: pr.number, per_page: 100 }
              );

              // Cross-referenced events link to sub-PRs
              const subPrNumbers = new Set();
              for (const event of timeline) {
                if (event.event === 'cross-referenced' && event.source?.issue?.pull_request) {
                  subPrNumbers.add(event.source.issue.number);
                }
              }

              // Also check commit messages as fallback
              const commits = await github.paginate(
                github.rest.pulls.listCommits,
                { owner, repo, pull_number: pr.number, per_page: 100 }
              );
              const mergePattern = /^Merge pull request #(\d+)/;
              const squashPattern = /\(#(\d+)\)$/m;
              for (const commit of commits) {
                const msg = commit.commit.message;
                const mergeMatch = msg.match(mergePattern);
                const squashMatch = msg.match(squashPattern);
                if (mergeMatch) subPrNumbers.add(parseInt(mergeMatch[1]));
                if (squashMatch) subPrNumbers.add(parseInt(squashMatch[1]));
              }

              core.info(`Found ${subPrNumbers.size} sub-PRs: ${[...subPrNumbers].join(', ')}`);

              // Extract issue refs from each sub-PR body
              for (const subPrNumber of subPrNumbers) {
                try {
                  const { data: subPr } = await github.rest.pulls.get({
                    owner, repo, pull_number: subPrNumber,
                  });
                  if (subPr.body) {
                    let match;
                    while ((match = closingKeywords.exec(subPr.body)) !== null) {
                      issueNumbers.add(parseInt(match[1]));
                    }
                    closingKeywords.lastIndex = 0;
                  }
                } catch (e) {
                  core.warning(`Could not fetch sub-PR #${subPrNumber}: ${e.message}`);
                }
              }
            }

            // Also extract from this PR's own body
            if (pr.body) {
              let match;
              while ((match = closingKeywords.exec(pr.body)) !== null) {
                issueNumbers.add(parseInt(match[1]));
              }
            }

            // Guard against self-reference (PRs are issues in GitHub's API)
            issueNumbers.delete(pr.number);

            core.info(`Issues found: ${[...issueNumbers].join(', ') || 'none'}`);

            const marker = '<!-- linked-issues-bot -->';
            let body;

            if (issueNumbers.size === 0) {
              body = `${marker}\n### ⚠️ No Linked Issues\n@${pr.user.login} This PR doesn't reference any issues. Please add a closing keyword to the description (e.g. \`Closes #123\`, \`Fixes #456\`).`;
            } else {
              const issueList = [...issueNumbers].map(n => `- Tracks #${n}`).join('\n');
              body = `${marker}\n### Linked Issues\n${issueList}`;
            }

            // Find existing bot comment to update
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr.number, per_page: 100 }
            );
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id,
                body,
              });
              core.info('Updated sticky comment');
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr.number,
                body,
              });
              core.info('Created sticky comment');
            }

  close-issues:
    if: >-
      github.event.action == 'closed'
      && github.event.pull_request.merged == true
      && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Close linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- linked-issues-bot -->';

            // Find the bot's sticky comment and parse issue numbers from it
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr.number, per_page: 100 }
            );
            const botComment = comments.find(c => c.body.includes(marker));

            if (!botComment) {
              core.info('No linked-issues bot comment found');
              return;
            }

            const issuePattern = /^- Tracks #(\d+)/gm;
            const issueNumbers = new Set();
            let match;
            while ((match = issuePattern.exec(botComment.body)) !== null) {
              issueNumbers.add(parseInt(match[1]));
            }

            // Guard against self-reference
            issueNumbers.delete(pr.number);

            core.info(`Issues to close: ${[...issueNumbers].join(', ') || 'none'}`);

            for (const issueNumber of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner, repo, issue_number: issueNumber,
                });
                if (issue.state === 'open') {
                  await github.rest.issues.update({
                    owner, repo, issue_number: issueNumber,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                  core.info(`Closed issue #${issueNumber}`);
                }
              } catch (e) {
                core.warning(`Could not close issue #${issueNumber}: ${e.message}`);
              }
            }
